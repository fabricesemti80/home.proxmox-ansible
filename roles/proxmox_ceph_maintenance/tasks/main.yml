---
- name: Install Ceph maintenance script
  ansible.builtin.copy:
    dest: "{{ proxmox_ceph_maintenance_script }}"
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      if [[ -f /var/log/ceph ]]; then
        mv /var/log/ceph "/var/log/ceph.bak.$(date +%s)"
      fi

      if [[ ! -d /var/log/ceph ]]; then
        mkdir -p /var/log/ceph
      fi

      chown ceph:ceph /var/log/ceph
      chmod 750 /var/log/ceph

      systemctl restart ceph-mon.target ceph-mgr.target ceph-mds.target ceph-osd.target

- name: Schedule weekly Ceph maintenance
  ansible.builtin.cron:
    name: "{{ proxmox_ceph_maintenance_cron_name }}"
    user: root
    minute: "{{ proxmox_ceph_maintenance_minute }}"
    hour: "{{ proxmox_ceph_maintenance_hour }}"
    weekday: "{{ proxmox_ceph_maintenance_weekday }}"
    job: "{{ proxmox_ceph_maintenance_script }} >> {{ proxmox_ceph_maintenance_log }} 2>&1"
