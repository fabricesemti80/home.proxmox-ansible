---
- name: Stop Beszel agent processes
  ansible.builtin.shell: pkill -9 beszel-agent || true
  changed_when: false
  failed_when: false

- name: Stop Beszel agent services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - beszel-agent
    - beszel-agent-update.service
    - beszel-agent-update.timer
  failed_when: false

- name: Disable Beszel agent services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
  loop:
    - beszel-agent
    - beszel-agent-update.timer
    - beszel-agent-update.service
  failed_when: false

- name: Check if beszel-agent package is installed
  ansible.builtin.shell: dpkg -l | grep -q beszel-agent
  register: beszel_pkg_check
  changed_when: false
  failed_when: false

- name: Remove beszel-agent package if installed
  ansible.builtin.apt:
    name: beszel-agent
    state: absent
    purge: true
    autoremove: true
  when: beszel_pkg_check.rc == 0

- name: Remove systemd service files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/beszel-agent.service
    - /etc/systemd/system/beszel-agent-update.service
    - /etc/systemd/system/beszel-agent-update.timer
    - /etc/systemd/system/beszel-agent.service.d
    - /etc/systemd/system/multi-user.target.wants/beszel-agent.service
    - /etc/systemd/system/timers.target.wants/beszel-agent-update.timer
    - /usr/lib/systemd/system/beszel-agent.service
    - /lib/systemd/system/beszel-agent.service

- name: Remove systemd helper files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/systemd/deb-systemd-helper-enabled/multi-user.target.wants/beszel-agent.service
    - /var/lib/systemd/deb-systemd-helper-enabled/beszel-agent.service.dsh-also
    - /var/lib/systemd/timers/stamp-beszel-agent-update.timer

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reset failed systemd units
  ansible.builtin.command: systemctl reset-failed
  changed_when: false

- name: Remove binaries
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/beszel-agent
    - /usr/bin/beszel-agent
    - /opt/beszel/beszel-agent
    - /opt/beszel-agent

- name: Remove configuration files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/beszel
    - /etc/beszel-agent.conf

- name: Remove data and log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/beszel-agent
    - /var/log/beszel-agent
    - /opt/beszel
    - /home/beszel

- name: Remove temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/beszel-agent.tar.gz
    - /tmp/install-agent.sh
    - /var/tmp/beszel-agent.deb
    - /var/lib/dpkg/info/beszel-agent.prerm
    - /var/lib/dpkg/info/beszel-agent.postrm
    - /var/lib/dpkg/info/beszel-agent.postinst
    - /var/lib/dpkg/info/beszel-agent.md5sums
    - /var/lib/dpkg/info/beszel-agent.templates
    - /var/lib/dpkg/info/beszel-agent.list
    - /usr/share/doc/beszel-agent
    - /usr/share/lintian/overrides/beszel-agent

- name: Check if beszel user exists
  ansible.builtin.getent:
    database: passwd
    key: beszel
  register: beszel_user
  failed_when: false

- name: Remove beszel user
  ansible.builtin.shell: userdel -f beszel 2>/dev/null || true
  changed_when: false
  when: beszel_user.ansible_facts.getent_passwd is defined and beszel_user.ansible_facts.getent_passwd.beszel is not none

- name: Check if beszel-agent user exists
  ansible.builtin.getent:
    database: passwd
    key: beszel-agent
  register: beszel_agent_user
  failed_when: false

- name: Remove beszel-agent user
  ansible.builtin.shell: userdel -f beszel-agent 2>/dev/null || true
  changed_when: false
  when: beszel_agent_user.ansible_facts.getent_passwd is defined and beszel_agent_user.ansible_facts.getent_passwd['beszel-agent'] is not none

- name: Check if beszel-agent group exists
  ansible.builtin.getent:
    database: group
    key: beszel-agent
  register: beszel_agent_group
  failed_when: false

- name: Remove beszel-agent group
  ansible.builtin.group:
    name: beszel-agent
    state: absent
  when: beszel_agent_group.ansible_facts.getent_group is defined and beszel_agent_group.ansible_facts.getent_group['beszel-agent'] is not none
