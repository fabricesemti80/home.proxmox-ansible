---
- name: Download Beszel agent install script
  ansible.builtin.get_url:
    url: https://get.beszel.dev
    dest: /tmp/install-agent.sh
    mode: '0755'

- name: Build install command arguments
  ansible.builtin.set_fact:
    beszel_agent_hub_url_normalized: >-
      {%- set hub = (beszel_agent_hub_url | default('') | trim) -%}
      {%- if not hub -%}
      {{ '' }}
      {%- elif hub.startswith('ws://') or hub.startswith('wss://') -%}
      {{ hub if hub.endswith('/ws') else (hub | regex_replace('/+$', '')) ~ '/ws' }}
      {%- elif hub.startswith('http://') -%}
      {{ 'ws://' ~ (hub | regex_replace('^http://', '') | regex_replace('/+$', '')) ~ '/ws' }}
      {%- elif hub.startswith('https://') -%}
      {{ 'wss://' ~ (hub | regex_replace('^https://', '') | regex_replace('/+$', '')) ~ '/ws' }}
      {%- else -%}
      {{ 'ws://' ~ (hub | regex_replace('/+$', '')) ~ '/ws' }}
      {%- endif -%}

- name: Build install command arguments
  ansible.builtin.set_fact:
    beszel_install_args: >-
      -p {{ beszel_agent_port }}
      -k "{{ beszel_agent_key }}"
      {% if beszel_agent_token %}-t "{{ beszel_agent_token }}"{% endif %}
      {% if beszel_agent_hub_url_normalized %}-url "{{ beszel_agent_hub_url_normalized }}"{% endif %}

- name: Run Beszel agent install script
  ansible.builtin.shell: |
    set -o pipefail
    yes | /tmp/install-agent.sh {{ beszel_install_args }} || test $? -eq 141
  args:
    executable: /bin/bash
  register: beszel_install_result
  changed_when: "'already installed' not in beszel_install_result.stdout"

- name: Ensure Beszel agent systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/beszel-agent.service.d
    state: directory
    mode: "0755"

- name: Manage Beszel agent systemd environment overrides
  ansible.builtin.template:
    src: override.conf.j2
    dest: /etc/systemd/system/beszel-agent.service.d/override.conf
    mode: "0644"
  notify: Restart beszel-agent

- name: Ensure Beszel agent service is running
  ansible.builtin.systemd:
    name: beszel-agent
    state: started
    enabled: true
    daemon_reload: true

- name: Clean up install script
  ansible.builtin.file:
    path: /tmp/install-agent.sh
    state: absent
