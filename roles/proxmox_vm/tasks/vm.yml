---
- name: Resolve VM defaults
  ansible.builtin.set_fact:
    _proxmox_vm_ip: "{{ proxmox_vm_item.ip | default(proxmox_vm_ip) }}"
    _proxmox_vm_cidr: "{{ proxmox_vm_item.cidr | default(proxmox_vm_cidr) }}"
    _proxmox_vm_bridge: "{{ proxmox_vm_item.bridge | default(proxmox_vm_bridge) }}"
    _proxmox_vm_memory: "{{ proxmox_vm_item.memory | default(proxmox_vm_memory) }}"
    _proxmox_vm_sockets: "{{ proxmox_vm_item.sockets | default(proxmox_vm_sockets) }}"
    _proxmox_vm_cores: "{{ proxmox_vm_item.cores | default(proxmox_vm_cores) }}"
    _proxmox_vm_reboot_on_change: "{{ proxmox_vm_item.reboot_on_change | default(proxmox_vm_reboot_on_change) }}"
    _proxmox_vm_template_vmid: "{{ proxmox_vm_item.template_vmid | default(proxmox_vm_template_vmid) }}"
    _proxmox_vm_template_node: "{{ proxmox_vm_item.template_node | default(proxmox_vm_template_node) }}"
    _proxmox_vm_template_host: "{{ proxmox_vm_item.template_host | default(proxmox_vm_template_host) }}"
    _proxmox_vm_state: "{{ proxmox_vm_item.state | default(proxmox_vm_state) }}"
    _proxmox_vm_full_clone: "{{ proxmox_vm_item.full_clone | default(proxmox_vm_full_clone) }}"
    _proxmox_vm_started: "{{ proxmox_vm_item.started | default(proxmox_vm_started) }}"

- name: Resolve VM derived defaults
  ansible.builtin.set_fact:
    _proxmox_vm_gateway: "{{ proxmox_vm_item.gateway | default(_proxmox_vm_ip | regex_replace('\\.[0-9]+$', '.1')) }}"
    _proxmox_vm_vmid: "{{ proxmox_vm_item.vmid | default((_proxmox_vm_ip.split('.')[2] | int * 100) + (_proxmox_vm_ip.split('.')[3] | int)) }}"
    _proxmox_vm_vlan: "{{ proxmox_vm_item.vlan | default(_proxmox_vm_ip.split('.')[2] | int) }}"

- name: Resolve VM name
  ansible.builtin.set_fact:
    _proxmox_vm_name: "{{ proxmox_vm_item.name | default(proxmox_vm_name) }}"

- name: Check VM state
  ansible.builtin.command: "qm status {{ _proxmox_vm_vmid }}"
  register: proxmox_vm_status
  failed_when: false
  changed_when: false
  check_mode: false

- name: Show VM creation plan
  ansible.builtin.debug:
    msg: "Would clone template {{ _proxmox_vm_template_vmid }} from {{ _proxmox_vm_template_node }} to VM {{ _proxmox_vm_vmid }} ({{ _proxmox_vm_name }}) with {{ _proxmox_vm_ip }}/{{ _proxmox_vm_cidr }} on {{ proxmox_vm_target_node }}."
  when:
    - ansible_check_mode
    - _proxmox_vm_state == 'present'
    - proxmox_vm_status.rc != 0

- name: Clone VM from template
  ansible.builtin.command: >
    qm clone {{ _proxmox_vm_template_vmid }} {{ _proxmox_vm_vmid }}
    --name {{ _proxmox_vm_name }}
    --full {{ 1 if _proxmox_vm_full_clone else 0 }}
    --target {{ proxmox_vm_target_node }}
  delegate_to: "{{ _proxmox_vm_template_host }}"
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - proxmox_vm_status.rc != 0

- name: Read VM config
  ansible.builtin.command: "qm config {{ _proxmox_vm_vmid }}"
  register: proxmox_vm_config
  changed_when: false
  check_mode: false
  when:
    - _proxmox_vm_state == 'present'
    - not ansible_check_mode or proxmox_vm_status.rc == 0

- name: Configure VM cloud-init network
  ansible.builtin.command: >
    qm set {{ _proxmox_vm_vmid }}
    --ipconfig0 ip={{ _proxmox_vm_ip }}/{{ _proxmox_vm_cidr }},gw={{ _proxmox_vm_gateway }}
  register: proxmox_vm_ipconfig_set
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - "'ipconfig0: ip=' ~ _proxmox_vm_ip ~ '/' ~ _proxmox_vm_cidr ~ ',gw=' ~ _proxmox_vm_gateway not in proxmox_vm_config.stdout"

- name: Configure VM name
  ansible.builtin.command: >
    qm set {{ _proxmox_vm_vmid }}
    --name {{ _proxmox_vm_name }}
  register: proxmox_vm_name_set
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - "'name: ' ~ _proxmox_vm_name not in proxmox_vm_config.stdout"

- name: Configure VM memory and CPU
  ansible.builtin.command: >
    qm set {{ _proxmox_vm_vmid }}
    --memory {{ _proxmox_vm_memory }}
    --sockets {{ _proxmox_vm_sockets }}
    --cores {{ _proxmox_vm_cores }}
  register: proxmox_vm_hardware_set
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - "'memory: ' ~ _proxmox_vm_memory not in proxmox_vm_config.stdout or 'sockets: ' ~ _proxmox_vm_sockets not in proxmox_vm_config.stdout or 'cores: ' ~ _proxmox_vm_cores not in proxmox_vm_config.stdout"

- name: Show VM hardware update plan
  ansible.builtin.debug:
    msg: "Would set VM {{ _proxmox_vm_vmid }} name={{ _proxmox_vm_name }}, memory={{ _proxmox_vm_memory }}, sockets={{ _proxmox_vm_sockets }}, cores={{ _proxmox_vm_cores }}."
  when:
    - ansible_check_mode
    - _proxmox_vm_state == 'present'
    - proxmox_vm_status.rc == 0
    - "'name: ' ~ _proxmox_vm_name not in proxmox_vm_config.stdout or 'memory: ' ~ _proxmox_vm_memory not in proxmox_vm_config.stdout or 'sockets: ' ~ _proxmox_vm_sockets not in proxmox_vm_config.stdout or 'cores: ' ~ _proxmox_vm_cores not in proxmox_vm_config.stdout"

- name: Resolve VM net0 config
  ansible.builtin.set_fact:
    _proxmox_vm_net0_current: "{{ proxmox_vm_config.stdout | regex_search('(?m)^net0: (.+)$', '\\1') | first | default('virtio') }}"
  when:
    - _proxmox_vm_state == 'present'
    - proxmox_vm_config.stdout is defined

- name: Resolve VM net0 target
  ansible.builtin.set_fact:
    _proxmox_vm_net0_target: "{{ _proxmox_vm_net0_current | regex_replace(',bridge=[^,]+', '') | regex_replace(',tag=[0-9]+', '') }},bridge={{ _proxmox_vm_bridge }},tag={{ _proxmox_vm_vlan }}"
  when:
    - _proxmox_vm_state == 'present'
    - _proxmox_vm_net0_current is defined

- name: Configure VM VLAN
  ansible.builtin.command: "qm set {{ _proxmox_vm_vmid }} --net0 {{ _proxmox_vm_net0_target }}"
  register: proxmox_vm_vlan_set
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - _proxmox_vm_net0_target is defined
    - _proxmox_vm_net0_current != _proxmox_vm_net0_target

- name: Reboot VM after config changes
  ansible.builtin.command: "qm reboot {{ _proxmox_vm_vmid }}"
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - _proxmox_vm_reboot_on_change | bool
    - "'status: running' in proxmox_vm_status.stdout"
    - proxmox_vm_ipconfig_set is changed or proxmox_vm_name_set is changed or proxmox_vm_hardware_set is changed or proxmox_vm_vlan_set is changed

- name: Show VM VLAN update plan
  ansible.builtin.debug:
    msg: "Would set VM {{ _proxmox_vm_vmid }} net0 to {{ _proxmox_vm_net0_target }}."
  when:
    - ansible_check_mode
    - _proxmox_vm_state == 'present'
    - proxmox_vm_status.rc == 0
    - _proxmox_vm_net0_target is defined
    - _proxmox_vm_net0_current != _proxmox_vm_net0_target

- name: Show VM network update plan
  ansible.builtin.debug:
    msg: "Would set VM {{ _proxmox_vm_vmid }} ipconfig0 to {{ _proxmox_vm_ip }}/{{ _proxmox_vm_cidr }}, gateway {{ _proxmox_vm_gateway }}."
  when:
    - ansible_check_mode
    - _proxmox_vm_state == 'present'
    - proxmox_vm_status.rc == 0
    - "'ipconfig0: ip=' ~ _proxmox_vm_ip ~ '/' ~ _proxmox_vm_cidr ~ ',gw=' ~ _proxmox_vm_gateway not in proxmox_vm_config.stdout"

- name: Start VM
  ansible.builtin.command: "qm start {{ _proxmox_vm_vmid }}"
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'present'
    - _proxmox_vm_started | bool
    - "'status: running' not in proxmox_vm_status.stdout"

- name: Show VM destroy plan
  ansible.builtin.debug:
    msg: "Would destroy VM {{ _proxmox_vm_vmid }} on {{ proxmox_vm_target_node }}."
  when:
    - ansible_check_mode
    - _proxmox_vm_state == 'absent'
    - proxmox_vm_status.rc == 0

- name: Stop VM before destroy
  ansible.builtin.command: "qm stop {{ _proxmox_vm_vmid }}"
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'absent'
    - "'status: running' in proxmox_vm_status.stdout"

- name: Destroy VM
  ansible.builtin.command: >
    qm destroy {{ _proxmox_vm_vmid }}
    {% if proxmox_vm_destroy_purge | bool %}--purge 1{% endif %}
  when:
    - not ansible_check_mode
    - _proxmox_vm_state == 'absent'
    - proxmox_vm_status.rc == 0
