---
- name: Ensure role runs on target node
  ansible.builtin.assert:
    that:
      - inventory_hostname_short == proxmox_vm_target_node
    fail_msg: "Run this role on {{ proxmox_vm_target_node }}, not {{ inventory_hostname_short }}."
    quiet: true

- name: Manage Proxmox VM(s)
  ansible.builtin.include_tasks: vm.yml
  loop: "{{ proxmox_vms | default([{}]) }}"
  loop_control:
    loop_var: proxmox_vm_item
    label: "{{ proxmox_vm_item.vmid | default(proxmox_vm_item.ip | default(proxmox_vm_vmid)) }}"
